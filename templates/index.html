<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifewood OCR Studio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="logo-box">
          <img src="/static/lifewood-logo.png" alt="Lifewood Logo" class="brand-logo">
        </div>

        <div class="brand-text">
          <h1>Lifewood OCR Studio</h1>
          <p>Professional OCR and document review workspace</p>
        </div>
      </div>

      <div class="status-pill" id="statusText">Ready</div>
    </header>

    <section class="toolbar-card">
      <div class="toolbar-group">
        <label class="file-upload">
          <input type="file" id="fileInput" multiple accept="image/*">
          <span>Upload Images</span>
        </label>

        <button id="prevBtn" class="btn secondary">Previous</button>
        <button id="nextBtn" class="btn secondary">Next</button>
        <button id="downloadBtn" class="btn primary">Download TXT</button>
        <button id="resetViewBtn" class="btn ghost">Reset View</button>
        <button id="layoutToggleBtn" class="btn ghost">Layout: Horizontal</button>
      </div>

      <div class="toolbar-group">
        <button id="drawToggleBtn" class="btn ghost">Draw Mode: Off</button>
        <button id="boxModeBtn" class="btn ghost">Box Mode: Off</button>
        <button id="undoBtn" class="btn ghost">Undo</button>
        <button id="clearDrawBtn" class="btn ghost danger">Clear Draw</button>
      </div>

      <div class="toolbar-group sliders">
        <label class="control">
          <span>Zoom</span>
          <input type="range" id="zoomSlider" min="20" max="400" value="100">
        </label>

        <label class="control">
          <span>Brightness</span>
          <input type="range" id="brightnessSlider" min="50" max="200" value="100">
        </label>

        <label class="control">
          <span>Contrast</span>
          <input type="range" id="contrastSlider" min="50" max="200" value="100">
        </label>

        <label class="control">
          <span>Text Size</span>
          <input type="range" id="textSizeSlider" min="12" max="40" value="16">
        </label>
      </div>
    </section>

    <main class="main horizontal">
      <section class="panel image-panel">
        <div class="panel-header">
          <h2>Image Viewer</h2>
          <span class="panel-subtitle">Pan, zoom, annotate</span>
        </div>

        <div class="image-wrapper" id="imageWrapper">
          <img id="previewImage" src="" alt="Preview" draggable="false">
          <canvas id="drawCanvas"></canvas>
        </div>
      </section>

      <section class="panel text-panel">
        <div class="panel-header">
          <h2>OCR Text</h2>
          <span class="panel-subtitle">Editable extracted content</span>
        </div>

        <textarea id="ocrText" placeholder="OCR text will appear here..."></textarea>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
